<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ChatApp</title>
<style>
/* ── Reset ──────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0c0c10;
  --bg2:     #14141c;
  --bg3:     #1e1e2a;
  --bg4:     #28283a;
  --accent:  #7c6af7;
  --accent2: #5f4fd1;
  --green:   #22c55e;
  --red:     #ef4444;
  --text:    #eaeaf4;
  --text2:   #9898b8;
  --text3:   #55556e;
  --border:  rgba(255,255,255,.07);
  --shadow:  0 12px 40px rgba(0,0,0,.5);
  --r:       12px;
  --sidebar-w: 320px;
  --header-h:  60px;
  --input-h:   68px;
  --safe-b:    env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%; height: 100dvh;
  overflow: hidden;
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ══ AUTH ═══════════════════════════════════════ */
#auth-screen {
  position: fixed; inset: 0; z-index: 200;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  padding: 16px;
}
#auth-screen.hidden { display: none; }

.auth-card {
  width: 100%; max-width: 400px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px 32px;
  box-shadow: var(--shadow);
}
@media (max-width: 480px) {
  .auth-card { padding: 28px 20px; border-radius: 16px; }
}

.auth-logo { text-align: center; margin-bottom: 28px; }
.logo-icon {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  border-radius: 16px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 26px; margin-bottom: 12px;
  box-shadow: 0 4px 20px rgba(124,106,247,.4);
}
.auth-logo h1 { font-size: 22px; font-weight: 700; }
.auth-logo p  { font-size: 14px; color: var(--text2); margin-top: 4px; }

.auth-tabs {
  display: flex; background: var(--bg3);
  border-radius: 10px; padding: 3px; margin-bottom: 22px; gap: 3px;
}
.auth-tab {
  flex: 1; padding: 9px; background: none; border: none;
  color: var(--text2); font-size: 14px; font-weight: 600;
  border-radius: 8px; cursor: pointer; transition: all .2s;
}
.auth-tab.active { background: var(--accent); color: #fff; }

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: var(--text2); font-weight: 600; margin-bottom: 6px; letter-spacing: .03em; }
.form-group input {
  width: 100%; padding: 13px 14px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 15px; outline: none;
  transition: border-color .2s; -webkit-appearance: none;
}
.form-group input:focus { border-color: var(--accent); }
.form-group input::placeholder { color: var(--text3); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 13px 20px; border: none; border-radius: 10px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: all .18s; -webkit-tap-highlight-color: transparent;
}
.btn-primary { background: var(--accent); color: #fff; width: 100%; margin-top: 4px; }
.btn-primary:active { transform: scale(.98); }
.btn-icon {
  background: var(--bg3); color: var(--text2); border: 1px solid var(--border);
  width: 40px; height: 40px; padding: 0; border-radius: 10px; flex-shrink: 0;
}
.btn-icon:active { background: var(--bg4); }

.auth-err {
  background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3);
  color: #f87171; border-radius: 8px; padding: 10px 14px;
  font-size: 13px; margin-bottom: 14px; display: none;
}
.auth-err.show { display: block; }

/* ══ APP SHELL ══════════════════════════════════ */
#app { display: flex; height: 100dvh; overflow: hidden; position: relative; }
#app.hidden { display: none; }

/* ── Sidebar ─────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0;
  z-index: 30;
  transition: transform .28s cubic-bezier(.4,0,.2,1);
}

/* Mobile: sidebar slides over chat */
@media (max-width: 700px) {
  .sidebar {
    position: absolute; top: 0; left: 0; bottom: 0;
    transform: translateX(-100%);
    box-shadow: var(--shadow);
  }
  .sidebar.open { transform: translateX(0); }
}

.sidebar-backdrop {
  display: none; position: absolute; inset: 0; z-index: 29;
  background: rgba(0,0,0,.55); backdrop-filter: blur(2px);
}
@media (max-width: 700px) {
  .sidebar-backdrop.show { display: block; }
}

.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 14px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-header h2 { font-size: 19px; font-weight: 700; }
.sidebar-actions { display: flex; gap: 6px; }

.search-wrap {
  padding: 10px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.search-inner {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 0 12px;
}
.search-inner svg { color: var(--text3); flex-shrink: 0; }
.search-inner input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-size: 14px; padding: 10px 0;
}
.search-inner input::placeholder { color: var(--text3); }

.conv-list { flex: 1; overflow-y: auto; overscroll-behavior: contain; }
.conv-list::-webkit-scrollbar { width: 3px; }
.conv-list::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

.conv-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 14px; cursor: pointer;
  transition: background .12s; border-left: 3px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
.conv-item:hover, .conv-item.active { background: var(--bg3); }
.conv-item.active { border-left-color: var(--accent); }

.avatar { position: relative; flex-shrink: 0; }
.av-img {
  width: 46px; height: 46px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 700; color: #fff; overflow: hidden;
}
.av-img img { width: 100%; height: 100%; object-fit: cover; }
.av-dot {
  position: absolute; bottom: 1px; right: 1px;
  width: 12px; height: 12px; border-radius: 50%;
  border: 2px solid var(--bg2); background: var(--text3);
}
.av-dot.online { background: var(--green); }

.conv-info { flex: 1; min-width: 0; }
.conv-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.conv-prev { font-size: 13px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.conv-time { font-size: 11px; color: var(--text3); }
.badge {
  background: var(--accent); color: #fff;
  border-radius: 10px; font-size: 11px; font-weight: 700;
  padding: 2px 6px; min-width: 18px; text-align: center;
}

.sidebar-footer {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  padding-bottom: calc(12px + var(--safe-b));
}
.me-name { font-size: 14px; font-weight: 600; }
.me-status { font-size: 12px; color: var(--green); }

/* ── Chat Area ───────────────────────────────── */
.chat-area {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; min-width: 0;
  background: var(--bg);
}

/* Mobile: when a convo is open, hide sidebar and show full chat */
@media (max-width: 700px) {
  .chat-area { width: 100%; }
}

.chat-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; padding: 24px; text-align: center;
}
.chat-empty .ei { font-size: 56px; opacity: .25; }
.chat-empty h3 { font-size: 18px; font-weight: 600; color: var(--text2); }
.chat-empty p  { font-size: 14px; color: var(--text3); }

.chat-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
  height: var(--header-h);
  background: var(--bg2); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.chat-header-left { display: flex; align-items: center; gap: 10px; }

/* back button — always visible in chat header on mobile */
.back-btn {
  display: none; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 8px;
  background: none; border: none; color: var(--text2);
  cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
}
@media (max-width: 700px) { .back-btn { display: flex; } }

.peer-name  { font-size: 15px; font-weight: 700; }
.peer-status{ font-size: 12px; color: var(--text2); margin-top: 1px; }
.chat-actions { display: flex; gap: 6px; }

.call-btn {
  display: flex; align-items: center; justify-content: center;
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; transition: all .18s;
  -webkit-tap-highlight-color: transparent;
}
.call-btn:hover, .call-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* msgs */
.msgs {
  flex: 1; overflow-y: auto; overscroll-behavior: contain;
  padding: 16px 14px; display: flex; flex-direction: column; gap: 2px;
}
.msgs::-webkit-scrollbar { width: 3px; }
.msgs::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

.msg-group { display: flex; flex-direction: column; margin-bottom: 6px; }
.msg-group.mine   { align-items: flex-end; }
.msg-group.theirs { align-items: flex-start; }
.msg-sender { font-size: 12px; color: var(--text3); margin-bottom: 4px; padding: 0 10px; }

.bubble {
  max-width: min(72%, 420px);
  padding: 10px 14px; border-radius: 18px;
  font-size: 15px; line-height: 1.5; word-break: break-word;
}
.mine   .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 5px; }
.theirs .bubble { background: var(--bg3); color: var(--text); border-bottom-left-radius: 5px; }
.bubble.sending { opacity: .55; }

.msg-meta {
  display: flex; align-items: center; gap: 5px;
  padding: 2px 10px; font-size: 11px; color: var(--text3);
}
.mine .msg-meta { flex-direction: row-reverse; }
.read-tick { color: #a78bfa; }

.date-sep {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; color: var(--text3); margin: 10px 0;
}
.date-sep::before, .date-sep::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

.typing-row {
  display: flex; align-items: center; gap: 10px;
  padding: 4px 0; font-size: 13px; color: var(--text3);
}
.typing-dots { display: flex; gap: 4px; }
.tdot {
  width: 6px; height: 6px; background: var(--text3);
  border-radius: 50%; animation: tdot 1s infinite;
}
.tdot:nth-child(2) { animation-delay: .2s; }
.tdot:nth-child(3) { animation-delay: .4s; }
@keyframes tdot {
  0%,80%,100% { transform: translateY(0); }
  40%         { transform: translateY(-7px); }
}

.load-more { text-align: center; padding: 12px; }
.load-more button {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); border-radius: 20px; padding: 6px 16px;
  font-size: 13px; cursor: pointer;
}

/* input */
.chat-input-bar {
  padding: 10px 14px;
  padding-bottom: calc(10px + var(--safe-b));
  background: var(--bg2); border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.input-row {
  display: flex; align-items: flex-end; gap: 8px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 14px; padding: 8px 8px 8px 14px;
  transition: border-color .2s;
}
.input-row:focus-within { border-color: var(--accent); }
.chat-ta {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-size: 15px; line-height: 1.45;
  resize: none; max-height: 112px; min-height: 24px; font-family: inherit;
}
.chat-ta::placeholder { color: var(--text3); }
.send-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--accent); border: none; color: #fff;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .15s; -webkit-tap-highlight-color: transparent;
}
.send-btn:active { background: var(--accent2); }
.send-btn:disabled { opacity: .35; cursor: not-allowed; }

/* ══ MODALS ═════════════════════════════════════ */
.overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.65); backdrop-filter: blur(4px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .2s;
  padding: 0;
}
.overlay.show { opacity: 1; pointer-events: all; }

@media (min-width: 480px) {
  .overlay { align-items: center; padding: 20px; }
}

.modal {
  background: var(--bg2); border: 1px solid var(--border);
  width: 100%; max-width: 440px;
  border-radius: 20px 20px 0 0;
  box-shadow: var(--shadow);
  transform: translateY(40px); transition: transform .25s;
  max-height: 85dvh; display: flex; flex-direction: column;
}
@media (min-width: 480px) {
  .modal { border-radius: 20px; transform: scale(.96) translateY(0); }
}
.overlay.show .modal { transform: translateY(0); }
@media (min-width: 480px) {
  .overlay.show .modal { transform: scale(1); }
}

.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 18px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.modal-head h3 { font-size: 17px; font-weight: 700; }
.modal-close {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--bg3); border: none; color: var(--text2);
  cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center;
}
.modal-body { padding: 14px; overflow-y: auto; }

.user-result {
  display: flex; align-items: center; gap: 12px;
  padding: 12px; border-radius: 10px; cursor: pointer;
  transition: background .12s; -webkit-tap-highlight-color: transparent;
}
.user-result:hover, .user-result:active { background: var(--bg3); }
.ur-info { flex: 1; }
.ur-name  { font-size: 14px; font-weight: 600; }
.ur-email { font-size: 13px; color: var(--text2); }
.ur-badge { font-size: 12px; }
.ur-badge.on  { color: var(--green); }
.ur-badge.off { color: var(--text3); }
.no-res { text-align: center; color: var(--text3); font-size: 14px; padding: 20px; }

/* ══ CALL OVERLAY ════════════════════════════════ */
#call-screen {
  position: fixed; inset: 0; z-index: 150;
  background: #060608;
  display: none; flex-direction: column;
}
#call-screen.show { display: flex; }

.video-bg {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
#remote-video {
  width: 100%; height: 100%; object-fit: cover;
}

#local-video {
  position: absolute;
  top: calc(var(--header-h) + 12px); right: 14px;
  width: 110px; height: 160px;
  border-radius: 12px; overflow: hidden;
  border: 2px solid rgba(255,255,255,.15);
  background: #111; object-fit: cover; z-index: 5;
  display: none; /* shown only for video calls */
}
@media (min-width: 480px) {
  #local-video { width: 160px; height: 110px; top: auto; bottom: 110px; right: 20px; }
}

.call-top {
  position: relative; z-index: 5;
  padding: 16px 14px; padding-top: calc(16px + env(safe-area-inset-top, 0px));
  display: flex; align-items: center; justify-content: space-between;
}
.call-back {
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,.12); border: none; color: #fff;
  cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.call-type-badge {
  background: rgba(255,255,255,.12); border-radius: 20px;
  padding: 6px 14px; font-size: 13px; color: rgba(255,255,255,.8); font-weight: 600;
}

.call-center {
  position: relative; z-index: 5;
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  text-align: center;
}
.call-av {
  width: 90px; height: 90px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; font-weight: 700; color: #fff;
  box-shadow: 0 0 0 0 rgba(124,106,247,.5);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 rgba(124,106,247,.5); }
  70%  { box-shadow: 0 0 0 20px rgba(124,106,247,0); }
  100% { box-shadow: 0 0 0 0 rgba(124,106,247,0); }
}
.call-av.connected { animation: none; }
.call-peer-nm { font-size: 28px; font-weight: 700; color: #fff; }
.call-stat    { font-size: 16px; color: rgba(255,255,255,.6); }
.call-timer   { font-size: 18px; color: var(--green); font-variant-numeric: tabular-nums; display: none; }

.call-controls {
  position: relative; z-index: 5;
  padding: 0 20px calc(20px + var(--safe-b));
  display: flex; align-items: center; justify-content: center; gap: 14px; flex-wrap: wrap;
}
.cc-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  -webkit-tap-highlight-color: transparent;
}
.cc-btn button {
  width: 60px; height: 60px; border-radius: 50%; border: none;
  background: rgba(255,255,255,.14); color: #fff; font-size: 22px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s; backdrop-filter: blur(6px);
}
.cc-btn button:active { transform: scale(.92); }
.cc-btn button.danger { background: var(--red); }
.cc-btn button.active-g { background: rgba(34,197,94,.4); }
.cc-btn button.active-r { background: rgba(239,68,68,.4); }
.cc-btn span { font-size: 11px; color: rgba(255,255,255,.6); }

/* ── Incoming call banner ─────────────────────── */
#incoming-banner {
  position: fixed; bottom: calc(20px + var(--safe-b)); right: 16px; left: 16px;
  z-index: 160; display: none;
}
@media (min-width: 480px) {
  #incoming-banner { left: auto; width: 300px; }
}
#incoming-banner.show { display: block; }

.inc-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 18px; padding: 18px 18px 16px;
  box-shadow: var(--shadow);
  animation: slideUp .3s ease;
}
@keyframes slideUp {
  from { transform: translateY(80px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.inc-label { font-size: 12px; color: var(--text2); margin-bottom: 3px; }
.inc-name  { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
.inc-type  { font-size: 13px; color: var(--text2); margin-bottom: 14px; }
.inc-btns  { display: flex; gap: 10px; }
.inc-btns button {
  flex: 1; padding: 12px; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 600; cursor: pointer; transition: all .15s;
}
.inc-accept  { background: var(--green); color: #fff; }
.inc-decline { background: var(--red);   color: #fff; }
.inc-accept:active  { background: #16a34a; }
.inc-decline:active { background: #dc2626; }

/* ── Toast ──────────────────────────────────── */
#toast {
  position: fixed; top: calc(16px + env(safe-area-inset-top, 0px)); left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 18px;
  font-size: 14px; box-shadow: var(--shadow);
  z-index: 300; white-space: nowrap; max-width: 90vw;
  overflow: hidden; text-overflow: ellipsis;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.err  { border-left: 3px solid var(--red); }
#toast.ok   { border-left: 3px solid var(--green); }

/* ── Misc ───────────────────────────────────── */
.loader {
  width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.2);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .6s linear infinite; display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }
.centered { text-align: center; padding: 24px; color: var(--text3); font-size: 14px; }
</style>
</head>
<body>

<!-- ══ AUTH ══════════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">💬</div>
      <h1>ChatApp</h1>
      <p>Private, real-time messaging</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab"        onclick="switchTab('register')">Register</button>
    </div>

<!-- ══ TOAST ══════════════════════════════════════════ -->
<div id="toast"></div>

<script>
// ╔══════════════════════════════════════════════════╗
// ║  ChatApp Client — fixed calls + mobile layout    ║
// ╚══════════════════════════════════════════════════╝

// ─── CONFIG — update this to your worker URL ───────
const API  = 'https://YOUR_WORKER.workers.dev';
const WS   = API.replace(/^https?/, m => m === 'https' ? 'wss' : 'ws');

// ─── STATE ──────────────────────────────────────────
const S = {
  token: localStorage.getItem('ca_tok'),
  user:  JSON.parse(localStorage.getItem('ca_usr') || 'null'),
  convos: [],
  activeConvo: null,   // { id, peerId, peerName, peerAvatar }
  msgs: {},            // convoId → []
  ws: null,
  pingInterval: null,
  typingOut: false,
  typingDebounce: null,
  typingEl: null,
  onlineUsers: new Set(),
  loadingMsgs: false,
  call: {
    active: false,
    incoming: null,    // raw WS offer message
    pc: null,          // RTCPeerConnection
    localStream: null,
    type: null,        // 'audio'|'video'
    peerId: null,
    peerName: null,
    convoId: null,
    startedAt: null,
    timerIv: null,
    muted: false,
    camOff: false,
    pendingCandidates: [],  // ICE candidates queued before remote desc set
  }
};

// ─── UTILS ──────────────────────────────────────────
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const initials = n => (n||'?').split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2);
const tsFormat = ts => {
  if (!ts) return '';
  const d = new Date(ts*1000), now = new Date();
  return d.toDateString()===now.toDateString()
    ? d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
    : d.toLocaleDateString([],{month:'short',day:'numeric'});
};
const durFormat = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

function toast(msg, type='ok') {
  const el = $('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 3000);
}

function setAv(el, name, url) {
  el.innerHTML = url ? `<img src="${esc(url)}" alt="">` : initials(name);
}

// ─── API ────────────────────────────────────────────
async function api(path, opts={}) {
  const r = await fetch(`${API}${path}`, {
    ...opts,
    headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${S.token}`, ...(opts.headers||{}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  const d = await r.json().catch(()=>({}));
  if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);
  return d;
}

// ─── AUTH ────────────────────────────────────────────
function switchTab(t) {
  $('form-login').style.display = t==='login' ? '' : 'none';
  $('form-reg').style.display   = t==='reg'   ? '' : 'none';
  document.querySelectorAll('.auth-tab').forEach((el,i)=>el.classList.toggle('active',(i===0)===(t==='login')));
  hideErr();
}
function showErr(m) { const e=$('auth-err'); e.textContent=m; e.classList.add('show'); }
function hideErr()  { $('auth-err').classList.remove('show'); }

async function doLogin() {
  const email=$('li-email').value.trim(), pass=$('li-pass').value;
  if (!email||!pass) return showErr('Enter email/username and password');
  $('login-btn').innerHTML = '<span class="loader"></span>';
  try { saveSession(await api('/api/auth/login',{method:'POST',body:{email,password:pass}})); initApp(); }
  catch(e) { showErr(e.message); }
  finally  { $('login-btn').textContent='Sign In'; }
}

async function doRegister() {
  const username=$('rg-user').value.trim(), email=$('rg-email').value.trim(), password=$('rg-pass').value;
  if (!username||!email||!password) return showErr('All fields required');
  $('reg-btn').innerHTML = '<span class="loader"></span>';
  try { saveSession(await api('/api/auth/register',{method:'POST',body:{username,email,password}})); initApp(); }
  catch(e) { showErr(e.message); }
  finally  { $('reg-btn').textContent='Create Account'; }
}

function saveSession({token,user}) {
  S.token=token; S.user=user;
  localStorage.setItem('ca_tok',token);
  localStorage.setItem('ca_usr',JSON.stringify(user));
}

async function doLogout() {
  try { await api('/api/auth/logout',{method:'POST'}); } catch{}
  localStorage.removeItem('ca_tok'); localStorage.removeItem('ca_usr');
  S.token=null; S.user=null;
  if (S.ws) S.ws.close();
  $('auth-screen').classList.remove('hidden');
  $('app').classList.add('hidden');
}

// ─── INIT ────────────────────────────────────────────
function initApp() {
  $('auth-screen').classList.add('hidden');
  $('app').classList.remove('hidden');
  $('me-name').textContent = S.user.username;
  setAv($('me-av'), S.user.username, S.user.avatar_url);
  loadConvos();
  connectWS();
}

// ─── WEBSOCKET ───────────────────────────────────────
function connectWS() {
  if (S.ws && S.ws.readyState < 2) return;
  const ws = new WebSocket(`${WS}/ws?token=${S.token}`);
  S.ws = ws;
  ws.onopen = () => {
    S.pingInterval = setInterval(()=>{ if(ws.readyState===1) ws.send('{"type":"ping"}'); }, 25000);
  };
  ws.onmessage = ({data}) => { try { onWsMsg(JSON.parse(data)); } catch{} };
  ws.onclose  = () => { clearInterval(S.pingInterval); setTimeout(connectWS,3000); };
  ws.onerror  = () => ws.close();
}

function wsSend(obj) { if (S.ws?.readyState===1) S.ws.send(JSON.stringify(obj)); }

function onWsMsg(msg) {
  switch(msg.type) {
    case 'pong': break;

    case 'chat': {
      const cid = msg.convo_id;
      if (!S.msgs[cid]) S.msgs[cid] = [];
      // Replace optimistic temp msg or append
      const ti = S.msgs[cid].findIndex(m=>m.temp_id && m.temp_id===msg.temp_id);
      if (ti >= 0) S.msgs[cid][ti] = msg;
      else if (!S.msgs[cid].find(m=>m.id===msg.id)) S.msgs[cid].push(msg);

      if (S.activeConvo?.id === cid) { renderMsgs(); wsSend({type:'read',convo_id:cid}); }
      updateConvPreview(cid, msg);
      if (S.activeConvo?.id !== cid) toast(`${msg.sender_name}: ${msg.content.slice(0,50)}`);
      break;
    }

    case 'typing':
      if (msg.convo_id===S.activeConvo?.id && msg.user_id!==S.user.id)
        showTyping(msg.is_typing);
      break;

    case 'read':
      if (msg.convo_id===S.activeConvo?.id) renderMsgs();
      break;

    case 'user_status':
      msg.status==='online' ? S.onlineUsers.add(msg.user_id) : S.onlineUsers.delete(msg.user_id);
      updatePeerStatus(msg.user_id, msg.status);
      break;

    case 'call_offer':    onCallOffer(msg);    break;
    case 'call_answer':   onCallAnswer(msg);   break;
    case 'call_reject':   onCallReject(msg);   break;
    case 'call_end':      onCallEnd(msg);      break;
    case 'ice_candidate': onIceCandidate(msg); break;
  }
}

// ─── CONVERSATIONS ───────────────────────────────────
async function loadConvos() {
  try {
    S.convos = await api('/api/conversations');
    renderConvList(S.convos);
  } catch { $('conv-list').innerHTML='<div class="centered">Failed to load</div>'; }
}

function renderConvList(convos) {
  const el = $('conv-list');
  if (!convos.length) { el.innerHTML='<div class="centered">No conversations yet.<br>Click + to start one.</div>'; return; }
  el.innerHTML = convos.map(c => {
    const online = S.onlineUsers.has(c.peer_id) || c.peer_status==='online';
    const isMe   = c.last_sender===S.user.id;
    const prev   = c.last_msg ? (isMe?`You: ${c.last_msg}`:c.last_msg) : 'Say hello!';
    const active = S.activeConvo?.id===c.id;
    return `<div class="conv-item${active?' active':''}" onclick="openConvo('${c.id}','${c.peer_id}','${esc(c.peer_name)}','${c.peer_avatar||''}')">
      <div class="avatar">
        <div class="av-img">${c.peer_avatar?`<img src="${esc(c.peer_avatar)}">`:`${initials(c.peer_name)}`}</div>
        <span class="av-dot${online?' online':''}"></span>
      </div>
      <div class="conv-info">
        <div class="conv-name">${esc(c.peer_name)}</div>
        <div class="conv-prev">${esc(prev.slice(0,60))}</div>
      </div>
      <div class="conv-meta">
        <span class="conv-time">${tsFormat(c.last_msg_at)}</span>
        ${c.unread>0?`<span class="badge">${c.unread}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function filterConvs(q) {
  renderConvList(q ? S.convos.filter(c=>c.peer_name.toLowerCase().includes(q.toLowerCase())) : S.convos);
}

function updateConvPreview(cid, msg) {
  const c = S.convos.find(x=>x.id===cid);
  if (c) {
    c.last_msg=msg.content; c.last_msg_at=msg.created_at; c.last_sender=msg.sender_id;
    if (msg.sender_id!==S.user.id && S.activeConvo?.id!==cid) c.unread=(c.unread||0)+1;
    renderConvList(S.convos);
  }
}

function updatePeerStatus(uid, status) {
  S.convos.forEach(c=>{ if(c.peer_id===uid) c.peer_status=status; });
  renderConvList(S.convos);
  if (S.activeConvo?.peerId===uid) {
    $('peer-dot').className = `av-dot${status==='online'?' online':''}`;
    $('peer-st').textContent = status==='online' ? 'Online' : 'Offline';
  }
}

// ─── OPEN CONVO ──────────────────────────────────────
async function openConvo(id, peerId, peerName, peerAvatar) {
  S.activeConvo = { id, peerId, peerName, peerAvatar };
  closeSidebar();

  // Show chat UI
  $('chat-empty').style.display = 'none';
  $('chat-header').style.display = '';
  $('msgs').style.display = '';
  $('chat-input-bar').style.display = '';

  // Populate header
  $('peer-nm').textContent = peerName;
  setAv($('peer-av'), peerName, peerAvatar);
  const online = S.onlineUsers.has(peerId);
  $('peer-dot').className = `av-dot${online?' online':''}`;
  $('peer-st').textContent = online ? 'Online' : 'Offline';

  renderConvList(S.convos);
  $('chat-ta').focus();

  if (!S.msgs[id]) await loadMsgs(id);
  else renderMsgs();

  // Clear unread
  const c = S.convos.find(x=>x.id===id);
  if (c) { c.unread=0; renderConvList(S.convos); }
  wsSend({ type:'read', convo_id:id });
}

// Back button (mobile)
function goBack() {
  S.activeConvo = null;
  $('chat-empty').style.display = '';
  $('chat-header').style.display = 'none';
  $('msgs').style.display = 'none';
  $('chat-input-bar').style.display = 'none';
  renderConvList(S.convos);
  openSidebar();
}

async function loadMsgs(cid, before=null) {
  if (S.loadingMsgs) return;
  S.loadingMsgs = true;
  try {
    const qs = before ? `?before=${before}&limit=50` : '?limit=50';
    const rows = await api(`/api/conversations/${cid}/messages${qs}`);
    if (!S.msgs[cid]) S.msgs[cid]=[];
    S.msgs[cid] = before ? [...rows,...S.msgs[cid]] : rows;
    renderMsgs(!!before);
  } catch { toast('Failed to load messages','err'); }
  finally { S.loadingMsgs=false; }
}

function renderMsgs(prepend=false) {
  const el = $('msgs');
  const list = S.msgs[S.activeConvo?.id] || [];
  const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 80;
  const prevH = el.scrollHeight;

  if (!list.length) { el.innerHTML='<div class="centered">No messages yet. Say hello!</div>'; return; }

  let html='', lastDate=null, lastSender=null;
  for (let i=0; i<list.length; i++) {
    const m = list[i];
    const mine = m.sender_id===S.user.id;
    const d = new Date(m.created_at*1000);
    const ds = d.toDateString();
    const now = new Date();

    if (ds!==lastDate) {
      if (lastSender!==null) html+='</div>';
      lastDate=ds; lastSender=null;
      const label = ds===now.toDateString()?'Today'
        : ds===new Date(now-86400000).toDateString()?'Yesterday'
        : d.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
      html+=`<div class="date-sep">${label}</div>`;
    }

    const newGroup = m.sender_id!==lastSender;
    if (newGroup) {
      if (lastSender!==null) html+='</div>';
      html+=`<div class="msg-group ${mine?'mine':'theirs'}">`;
      if (!mine && newGroup) html+=`<div class="msg-sender">${esc(m.sender_name||'')}</div>`;
    }
    lastSender = m.sender_id;

    const next = list[i+1];
    const lastInGroup = !next || next.sender_id!==m.sender_id;
    html+=`<div class="bubble${m._tmp?' sending':''}">${esc(m.content)}</div>`;
    if (lastInGroup) {
      html+=`<div class="msg-meta">
        <span>${tsFormat(m.created_at)}</span>
        ${mine?(m.read_at?'<span class="read-tick">✓✓</span>':'<span>✓</span>'):''}
      </div>`;
    }
  }
  html+='</div>';
  el.innerHTML=html;

  if (prepend) el.scrollTop = el.scrollHeight - prevH;
  else if (atBottom || !prepend) el.scrollTop = el.scrollHeight;
}

function onMsgsScroll() {
  const el = $('msgs');
  if (el.scrollTop < 80 && !S.loadingMsgs && S.activeConvo) {
    const list = S.msgs[S.activeConvo.id]||[];
    if (list.length>=50) loadMsgs(S.activeConvo.id, list[0]?.created_at);
  }
}

// ─── TYPING ──────────────────────────────────────────
function showTyping(show) {
  const el = $('msgs');
  if (show && !S.typingEl) {
    S.typingEl = document.createElement('div');
    S.typingEl.className='typing-row';
    S.typingEl.innerHTML=`<div class="typing-dots"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div><span>${esc(S.activeConvo?.peerName)} is typing…</span>`;
    el.appendChild(S.typingEl);
    el.scrollTop=el.scrollHeight;
    clearTimeout(S.typingHide);
    S.typingHide=setTimeout(()=>showTyping(false),3000);
  } else if (!show && S.typingEl) {
    S.typingEl.remove(); S.typingEl=null;
  }
}

// ─── SEND ────────────────────────────────────────────
function onTaKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function onTaInput() {
  const el=$('chat-ta');
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,112)+'px';
  if (!S.typingOut && S.activeConvo) { S.typingOut=true; wsSend({type:'typing',convo_id:S.activeConvo.id,is_typing:true}); }
  clearTimeout(S.typingDebounce);
  S.typingDebounce=setTimeout(()=>{ S.typingOut=false; if(S.activeConvo) wsSend({type:'typing',convo_id:S.activeConvo.id,is_typing:false}); },1500);
}

function sendMsg() {
  const ta=$('chat-ta'), content=ta.value.trim();
  if (!content || !S.activeConvo) return;
  const cid=S.activeConvo.id, tmp='tmp_'+Date.now();
  if (!S.msgs[cid]) S.msgs[cid]=[];
  S.msgs[cid].push({ id:tmp, temp_id:tmp, convo_id:cid, sender_id:S.user.id,
    sender_name:S.user.username, content, created_at:Math.floor(Date.now()/1000), _tmp:true });
  renderMsgs();
  ta.value=''; ta.style.height='auto';
  wsSend({ type:'chat', convo_id:cid, content, temp_id:tmp });
}

// ─── MODALS ──────────────────────────────────────────
function openNewConvoModal() { openModal('modal-new'); $('usr-search').value=''; $('usr-results').innerHTML='<div class="no-res">Type to search for people</div>'; setTimeout(()=>$('usr-search').focus(),200); }

function overlayClick(e,id) { if(e.target===$(id)) closeModal(id); }

let usrDebounce;

  clearTimeout(usrDebounce);

            <span class="av-dot${u.status==='online'?' online':''}"></span>
          </div>
          <div class="ur-info">

            <div class="ur-email">${esc(u.email)}</div>

        </div>`).join('');
    } catch {}
  },280);
}

async function startConvoWith(uid, name, avatar) {
  closeModal('modal-new');

    await loadConvos();

}

// ─── SIDEBAR (mobile) ────────────────────────────────
function openSidebar()  { $('sidebar').classList.add('open'); $('sb-backdrop').classList.add('show'); }
function closeSidebar() { $('sidebar').classList.remove('open'); $('sb-backdrop').classList.remove('show'); }

// ══════════════════════════════════════════════════════
// ─── WEBRTC CALLS — fixed implementation ─────────────
// ══════════════════════════════════════════════════════
//
// Key fixes vs previous version:
// 1. Callee: setRemoteDescription BEFORE createAnswer (correct order)
// 2. ICE candidates queued until remote desc is set on BOTH sides
// 3. call_screen uses display:flex (not controlled via CSS .show class conflict)
// 4. pc.ontrack fires immediately if remote already sent tracks
// 5. Proper cleanup prevents ghost connections

const ICE = [
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'stun:stun2.l.google.com:19302'},
  // Free TURN from Open Relay (limited bandwidth, good for testing)
  {urls:'turn:openrelay.metered.ca:80',    username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443',   username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443?transport=tcp',username:'openrelayproject',credential:'openrelayproject'},
];

// Initiator (caller) flow:
//   getUserMedia → createPC → addTracks → createOffer → setLocal → send offer
// Callee flow:
//   getUserMedia → createPC → addTracks → setRemote(offer) → createAnswer → setLocal → send answer
// Both:
//   on ice_candidate received → addIceCandidate (or queue if no remote desc yet)

async function startCall(type) {
  if (S.call.active) return;
  if (!S.activeConvo?.peerId) return;

  S.call.type    = type;
  S.call.peerId  = S.activeConvo.peerId;
  S.call.peerName= S.activeConvo.peerName;
  S.call.convoId = S.activeConvo.id;

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia(
      type==='video' ? {audio:true,video:{facingMode:'user'}} : {audio:true,video:false}
    );
  } catch(e) {
    toast('Camera/mic access denied: '+e.message,'err'); return;
  }

  S.call.localStream = stream;
  S.call.active = true;
  showCallScreen('Calling…');

  if (type==='video') {
    const lv = $('local-video');
    lv.srcObject = stream;
    lv.style.display = '';
  }

  // Create PC and make offer
  createPC();
  stream.getTracks().forEach(t => S.call.pc.addTrack(t, stream));

  try {
    const offer = await S.call.pc.createOffer();
    await S.call.pc.setLocalDescription(offer);
    wsSend({
      type: 'call_offer',
      to_user_id: S.call.peerId,
      offer: S.call.pc.localDescription,
      call_type: type,
      caller_name: S.user.username,
      convo_id: S.call.convoId,
    });
  } catch(e) {
    toast('Failed to start call','err');
    cleanupCall();
  }
}

function createPC() {
  const pc = new RTCPeerConnection({iceServers: ICE});
  S.call.pc = pc;
  S.call.pendingCandidates = [];

  pc.onicecandidate = ({candidate}) => {
    if (candidate) wsSend({type:'ice_candidate', to_user_id:S.call.peerId, candidate});
  };

  pc.ontrack = ({streams}) => {
    if (!streams?.length) return;
    $('remote-video').srcObject = streams[0];
    $('call-stat').textContent = 'Connected';
    $('call-timer').style.display = '';
    $('call-av').classList.add('connected');
    S.call.startedAt = Date.now();
    startTimer();
  };

  pc.oniceconnectionstatechange = () => {
    const st = pc.iceConnectionState;
    if (st==='connected'||st==='completed') $('call-stat').textContent='Connected';
    if (st==='checking') $('call-stat').textContent='Connecting…';
    if (['failed','disconnected','closed'].includes(st) && S.call.active) {
      toast('Call connection lost','err'); cleanupCall();
    }
  };

  return pc;
}

// ── Helper: add queued ICE candidates after remote desc set ──
async function drainCandidates() {
  const pc = S.call.pc;
  if (!pc || !pc.remoteDescription) return;
  while (S.call.pendingCandidates.length) {
    const c = S.call.pendingCandidates.shift();
    try { await pc.addIceCandidate(c); } catch {}
  }
}

// ── Incoming offer ───────────────────────────────────
function onCallOffer(msg) {
  if (S.call.active) {
    wsSend({type:'call_reject',to_user_id:msg.from_user_id,reason:'busy'});
    return;
  }
  S.call.incoming = msg;
  S.call.peerId   = msg.from_user_id;
  S.call.peerName = msg.caller_name;
  S.call.convoId  = msg.convo_id;
  S.call.type     = msg.call_type;

  $('inc-name').textContent = msg.caller_name;
  $('inc-type').textContent = msg.call_type==='video'?'📹 Video call':'📞 Voice call';
  $('incoming-banner').classList.add('show');
  ringStart();
}

async function acceptCall() {
  const msg = S.call.incoming;
  if (!msg) return;
  S.call.incoming = null;
  $('incoming-banner').classList.remove('show');
  ringStop();

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia(
      msg.call_type==='video' ? {audio:true,video:{facingMode:'user'}} : {audio:true,video:false}
    );
  } catch(e) {
    toast('Camera/mic access denied','err'); return;
  }

  S.call.localStream = stream;
  S.call.active = true;
  showCallScreen('Connecting…');

  if (msg.call_type==='video') {
    const lv=$('local-video'); lv.srcObject=stream; lv.style.display='';
  }

  // Create PC, add tracks
  createPC();
  stream.getTracks().forEach(t => S.call.pc.addTrack(t, stream));

  try {
    // CORRECT ORDER: setRemote(offer) → createAnswer → setLocal
    await S.call.pc.setRemoteDescription(new RTCSessionDescription(msg.offer));
    await drainCandidates();  // drain any early ICE candidates
    const answer = await S.call.pc.createAnswer();
    await S.call.pc.setLocalDescription(answer);
    wsSend({
      type: 'call_answer',
      to_user_id: S.call.peerId,
      answer: S.call.pc.localDescription,
    });
  } catch(e) {
    toast('Failed to connect call','err');
    cleanupCall();
  }
}

function rejectCall() {
  const msg = S.call.incoming;
  S.call.incoming = null;
  $('incoming-banner').classList.remove('show');
  ringStop();
  if (msg) {
    wsSend({type:'call_reject',to_user_id:msg.from_user_id});
    logCall(msg.convo_id, msg.from_user_id, msg.call_type,'declined');
  }
}

// ── Answer received (on caller side) ────────────────
async function onCallAnswer(msg) {
  const pc = S.call.pc;
  if (!pc) return;
  try {
    await pc.setRemoteDescription(new RTCSessionDescription(msg.answer));
    await drainCandidates();  // drain ICE candidates that arrived before answer
  } catch(e) { console.error('setRemoteDescription(answer) failed',e); }
}

function onCallReject(msg) {
  toast(`${S.call.peerName||'User'} declined the call`);
  cleanupCall();
}

function onCallEnd(msg) { if (S.call.active) cleanupCall(); }

async function onIceCandidate(msg) {
  const pc = S.call.pc;
  if (!pc) return;
  const cand = new RTCIceCandidate(msg.candidate);
  if (pc.remoteDescription && pc.remoteDescription.type) {
    try { await pc.addIceCandidate(cand); } catch {}
  } else {
    // Queue until remote desc is set
    S.call.pendingCandidates.push(cand);
  }
}

function endCall(notify=true) {
  if (notify && S.call.peerId) wsSend({type:'call_end',to_user_id:S.call.peerId});
  const dur = S.call.startedAt ? Math.floor((Date.now()-S.call.startedAt)/1000) : 0;
  const status = S.call.startedAt ? 'answered' : 'missed';
  if (S.call.convoId && S.call.peerId)
    logCall(S.call.convoId, S.call.peerId, S.call.type, status, dur);
  cleanupCall();
}

function cleanupCall() {
  clearInterval(S.call.timerIv);
  ringStop();
  if (S.call.localStream) S.call.localStream.getTracks().forEach(t=>t.stop());
  if (S.call.pc) { try { S.call.pc.close(); } catch {} }
  Object.assign(S.call, {
    active:false, incoming:null, pc:null,
    localStream:null, type:null,
    peerId:null, peerName:null, convoId:null,
    startedAt:null, muted:false, camOff:false, pendingCandidates:[],
  });
  $('call-screen').style.display='none';
  $('remote-video').srcObject=null;
  const lv=$('local-video'); lv.srcObject=null; lv.style.display='none';
  $('incoming-banner').classList.remove('show');
}

function showCallScreen(status) {
  const c=S.call;
  $('call-av').textContent=initials(c.peerName);
  $('call-av').classList.remove('connected');
  $('call-peer-nm').textContent=c.peerName||'';
  $('call-stat').textContent=status;
  $('call-timer').style.display='none';
  $('call-timer').textContent='';
  $('call-type-badge').textContent = c.type==='video'?'Video Call':'Voice Call';
  $('btn-mute').textContent='🎤';
  $('btn-cam').textContent='📷';
  $('btn-cam').disabled = c.type!=='video';
  $('btn-cam').style.opacity = c.type!=='video'?'.3':'1';
  $('call-screen').style.display='flex';
  $('remote-video').srcObject=null;
}

function startTimer() {
  S.call.timerIv=setInterval(()=>{
    if (!S.call.startedAt) return;
    $('call-timer').textContent=durFormat(Math.floor((Date.now()-S.call.startedAt)/1000));
  },1000);
}

function toggleMute() {
  const s=S.call.localStream; if (!s) return;
  S.call.muted=!S.call.muted;
  s.getAudioTracks().forEach(t=>t.enabled=!S.call.muted);
  $('btn-mute').textContent=S.call.muted?'🔇':'🎤';
  $('btn-mute').className=S.call.muted?'active-r':'';
}

function toggleCam() {
  const s=S.call.localStream; if (!s||S.call.type!=='video') return;
  S.call.camOff=!S.call.camOff;
  s.getVideoTracks().forEach(t=>t.enabled=!S.call.camOff);
  $('btn-cam').textContent=S.call.camOff?'🚫':'📷';
  $('btn-cam').className=S.call.camOff?'active-r':'';
}

function toggleSpeaker() {
  const v=$('remote-video'); v.muted=!v.muted;
  $('btn-spk').textContent=v.muted?'🔈':'🔊';
  $('btn-spk').className=v.muted?'active-r':'';
}

async function logCall(convoId,peerId,type,status,duration=0) {
  try {
    const now=Math.floor(Date.now()/1000);
    await api('/api/calls',{method:'POST',body:{
      convo_id:convoId, callee_id:peerId, type, status,
      started_at: now-(duration||0), ended_at:now, duration
    }});
  } catch {}
}

// ─── Ring ────────────────────────────────────────────
let _ringCtx=null, _ringNodes=[];
function ringStart() {
  try {
    _ringCtx=new AudioContext();
    function beep() {
      if (!_ringCtx) return;
      const o=_ringCtx.createOscillator(), g=_ringCtx.createGain();
      o.connect(g); g.connect(_ringCtx.destination);
      o.frequency.value=880; g.gain.value=0.08;
      o.start(); o.stop(_ringCtx.currentTime+0.2);
      _ringNodes.push(o);
    }
    beep(); const iv=setInterval(beep,1000);
    _ringNodes.push({stop:()=>clearInterval(iv)});
  } catch {}
}
function ringStop() {
  _ringNodes.forEach(n=>{ try{ n.stop?.(); }catch{} }); _ringNodes=[];
  try { _ringCtx?.close(); } catch {}
  _ringCtx=null;
}

// ─── BOOT ────────────────────────────────────────────

$('rg-email').onkeydown = e=>e.key==='Enter'&&$('rg-pass').focus();
$('rg-pass').onkeydown  = e=>e.key==='Enter'&&doRegister();
</script>
